<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto Final - Lógica de Sistemas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    width:700px;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#003366;
    margin-bottom:10px;
}

h2{
    color:#555;
    margin-bottom:30px;
    font-weight:normal;
}

.linea{
    width:100%;
    height:3px;
    background:#003366;
    margin-bottom:30px;
}

.boton{
    display:block;
    width:300px;
    margin:15px auto;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#003366;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.boton:hover{
    background:#0055aa;
    transform:scale(1.03);
}

footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}

</style>

</head>
<body>

<div class="contenedor">

    <h1>PROYECTO FINAL</h1>

    <h2>LÓGICA DE SISTEMAS</h2>

    <div class="linea"></div>

    <button class="boton"
    onclick="location.href='sopa.html'">
        Sopa de Letras
    </button>

    <button class="boton"
    onclick="location.href='preguntas.html'">
        Preguntas y Respuestas
    </button>

    <footer>
        Aplicaciones de Lógica • Proyecto Educativo
    </footer>

</div>

</body>
</html>
